name: schema-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pytest fastapi uvicorn httpx

      - name: Validate Granite schemas
        run: python tools/validate_schemas.py

      - name: Compile Python files
        run: python -m compileall ai analytics core main.py tools

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest
